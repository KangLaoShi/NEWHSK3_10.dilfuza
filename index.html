        const dialogues = [
          {
            title: { uz: "1-Matn: Sinfxonada", ru: "Текст 1: В классе", en: "Text 1: In the classroom" },
            lines: [
              { speaker: "同学", zh: "你的数学越来越好，能不能介绍一下学习方法？", py: "Nǐ de shùxué yuè lái yuè hǎo, néng bù néng jièshào yíxià xuéxí fāngfǎ?", uz: "Sening matematikang tobora yaxshilanib bormoqda, o'rganish usulingni tanishtira olasanmi?", ru: "Твоя математика становится все лучше, можешь рассказать о своих методах учебы?", en: "Your math is getting better and better, can you introduce your study methods?" },
              { speaker: "刘小雪", zh: "没有什么特别的方法，认真听课，认真记笔记。", py: "Méiyǒu shénme tèbié de fāngfǎ, rènzhēn tīngkè, rènzhēn jì bǐjì.", uz: "Hech qanday maxsus usul yo'q, darsni diqqat bilan eshitish va diqqat bilan qaydlar qilish.", ru: "Нет никаких особых методов, внимательно слушать на уроке и делать заметки.", en: "There is no special method, listen carefully in class and take notes seriously." },
              { speaker: "同学", zh: "我看过你的笔记，记得非常清楚。", py: "Wǒ kànguo nǐ de bǐjì, jì de fēicháng qīngchu.", uz: "Men sening qaydlaringni ko'rganman, juda aniq yozilgan.", ru: "Я видел твои заметки, они очень ясные.", en: "I have seen your notes, they are written very clearly." },

              { speaker: "刘小雪", zh: "笔记挺重要的，我每天写作业以前，都要看一遍。", py: "Bǐjì tǐng zhòngyào de, wǒ měitiān xiě zuòyè yǐqián, dōu yào kàn yí biàn.", uz: "Qaydlar juda muhim, men har kuni uy vazifasini yozishdan oldin ularni bir marta ko'rib chiqaman.", ru: "Заметки очень важны, я просматриваю их каждый день перед тем, как делать домашнее задание.", en: "Notes are quite important, I read them once every day before doing my homework." },
              { speaker: "同学", zh: "这个方法真好！我以后也试试，希望能提高成绩。", py: "Zhège fāngfǎ zhēn hǎo! Wǒ yǐhòu yě shìshi, xīwàng néng tígāo chéngjì.", uz: "Bu usul haqiqatan ham yaxshi! Men ham buni sinab ko'raman, natijalarimni yaxshilashga umid qilaman.", ru: "Это действительно хороший метод! Я тоже попробую, надеюсь улучшить свои оценки.", en: "This method is really good! I will try it later, hope to improve my grades." }
            ]
          },
          {
            title: { uz: "2-Matn: Sinfxonada", ru: "Текст 2: В классе", en: "Text 2: In the classroom" },
            lines: [
              { speaker: "同学", zh: "小雪，昨天的考试，你考得怎么样？", py: "Xiǎoxuě, zuótiān de kǎoshì, nǐ kǎo de zěnmeyàng?", uz: "Xiaoxue, kechagi imtihondan qanday o'tding?", ru: "Сяосюэ, как ты сдала вчерашний экзамен?", en: "Xiaoxue, how did you do on yesterday's exam?" },
              { speaker: "刘小雪", zh: "我觉得历史有点儿难，你呢？", py: "Wǒ juéde lìshǐ yǒudiǎnr nán, nǐ ne?", uz: "Menimcha, tarix biroz qiyin bo'ldi, sen-chi?", ru: "Мне кажется, история была немного сложной, а тебе?", en: "I feel history was a bit difficult, how about you?" },
              { speaker: "同学", zh: "数学考试我没看清楚要求，做错了好几个题，考得挺差的。", py: "Shùxué kǎoshì wǒ méi kàn qīngchu yāoqiú, zuò cuò le hǎo jǐ gè tí, kǎo de tǐng chà de.", uz: "Matematika imtihonida talablarni aniq o'qimadim, bir necha savollarda xato qildim, juda yomon topshirdim.", ru: "На экзамене по математике я не ясно понял требования, сделал несколько ошибок, сдал довольно плохо.", en: "I didn't read the requirements clearly for the math exam, made mistakes on quite a few questions, and did pretty poorly." },
              { speaker: "刘小雪", zh: "明天还有考试呢，别想那么多了，先复习外语吧。", py: "Míngtiān hái yǒu kǎoshì ne, bié xiǎng nàme duō le, xiān fùxí wàiyǔ ba.", uz: "Ertaga ham imtihon bor, bu haqda ko'p o'ylama, avval chet tilini takrorlaylik.", ru: "Завтра еще экзамен, не думай об этом так много, давай сначала повторим иностранный язык.", en: "There is still an exam tomorrow, don't think too much about it, let's review the foreign language first." },
              { speaker: "同学", zh: "外语作业里有几个问题，我可以问问你吗？", py: "Wàiyǔ zuòyè lǐ yǒu jǐ gè wèntí, wǒ kěyǐ wènwen nǐ ma?", uz: "Chet tili uy vazifasida bir necha savollar bor, sendan so'rasam maylimi?", ru: "В домашнем задании по иностранному языку есть несколько вопросов, могу я спросить тебя?", en: "There are a few questions in the foreign language homework, can I ask you?" },
              { speaker: "刘小雪", zh: "当然可以。在学习上，遇到什么问题都可以问我。", py: "Dāngrán kěyǐ. Zài xuéxí shàng, yùdào shénme wèntí dōu kěyǐ wèn wǒ.", uz: "Albatta. O'qishda qanday muammoga duch kelsang, mendan so'rashing mumkin.", ru: "Конечно. Ты можешь спрашивать меня о любых проблемах в учебе.", en: "Of course. You can ask me about any problems you encounter in your studies." },
              { speaker: "同学", zh: "不好意思，这几个题我也不会。咱们还是一起去办公室问问李老师吧。", py: "Bù hǎoyìsi, zhè jǐ gè tí wǒ yě bú huì. Zánmen háishì yìqǐ qù bàngōngshì wènwen Lǐ lǎoshī ba.", uz: "Kechirasiz, bu savollarni men ham bilmayman. Keling, birga ofisga borib, Li o'qituvchidan so'raymiz.", ru: "Извини, эти вопросы я тоже не знаю. Давай вместе пойдем в офис и спросим учителя Ли.", en: "Sorry, I don't know these questions either. Let's go to the office together and ask Teacher Li." }
            ]
          },
          {
            title: { uz: "3-Matn: O'qituvchi Li ofisida", ru: "Текст 3: В офисе учителя Ли", en: "Text 3: In Teacher Li's office" },
            lines: [
              { speaker: "同学", zh: "李老师，书上有几个问题，我们想问问您。", py: "Lǐ lǎoshī, shū shàng yǒu jǐ gè wèntí, wǒmen xiǎng wènwen nín.", uz: "Li o'qituvchi, kitobda bir nechta savollar bor, sizdan so'ramoqchi edik.", ru: "Учитель Ли, в книге есть несколько вопросов, мы хотели бы спросить вас.", en: "Teacher Li, there are a few questions in the book, we would like to ask you." },
              { speaker: "李老师", zh: "好，坐下说吧，哪个题不会？", py: "Hǎo, zuò xià shuō ba, nǎge tí bú huì?", uz: "Yaxshi, o'tirib gapiring, qaysi savolni bilmaysiz?", ru: "Хорошо, садитесь и рассказывайте, какой вопрос не понятен?", en: "Okay, sit down and tell me, which question don't you understand?" },
              { speaker: "同学", zh: "书上第五页的这个对话我看不懂，小雪也不明白。", py: "Shū shàng dì wǔ yè de zhège duìhuà wǒ kàn bù dǒng, Xiǎoxuě yě bù míngbai.", uz: "Kitobning beshinchi sahifasidagi bu dialogni men tushunmadim, Xiaoxue ham tushunmadi.", ru: "Я не понимаю этот диалог на пятой странице книги, Сяосюэ тоже не понимает.", en: "I don't understand this dialogue on page five of the book, and Xiaoxue doesn't understand either." },
              { speaker: "李老师", zh: "我课上讲过这几句话，再给你们讲一遍。", py: "Wǒ kè shàng jiǎngguo zhè jǐ jù huà, zài gěi nǐmen jiǎng yí biàn.", uz: "Men darsda bu gaplarni tushuntirgan edim, sizlarga yana bir marta tushuntirib beraman.", ru: "Я объяснял эти предложения на уроке, объясню вам еще раз.", en: "I explained these sentences in class, I'll explain them to you once more." },
              { speaker: "同学", zh: "我终于懂了。这些句子一点儿也不难。", py: "Wǒ zhōngyú dǒng le. Zhèxiē jùzi yìdiǎnr yě bù nán.", uz: "Men nihoyat tushundim. Bu gaplar umuman qiyin emas ekan.", ru: "Я наконец-то понял. Эти предложения совсем не сложные.", en: "I finally understand. These sentences are not difficult at all." },
              { speaker: "刘小雪", zh: "我也明白了，谢谢您，李老师。", py: "Wǒ yě míngbai le, xièxie nín, Lǐ lǎoshī.", uz: "Men ham tushundim, rahmat sizga, Li o'qituvchi.", ru: "Я тоже поняла, спасибо вам, учитель Ли.", en: "I understand too, thank you, Teacher Li." },
              { speaker: "李老师", zh: "我这本书上还有几个练习，你们回家也做一做，明天再把书还给我。", py: "Wǒ zhè běn shū shàng háiyǒu jǐ gè liànxí, nǐmen huíjiā yě zuò yi zuò, míngtiān zài bǎ shū huán gěi wǒ.", uz: "Mening bu kitobimda yana bir nechta mashqlar bor, uyga borib ularni ham bajaring, kitobni ertaga menga qaytarib berasiz.", ru: "В этой моей книге есть еще несколько упражнений, сделайте их дома, а завтра вернете мне книгу.", en: "There are a few more exercises in my book here, you can do them at home, and return the book to me tomorrow." }
            ]
          },
          {
            title: { uz: "4-Matn: Uyda", ru: "Текст 4: Дома", en: "Text 4: At home" },
            lines: [

        function Flashcards({ speak }) {

          const nextCard = () => {
            setIsFlipped(false);
            setCurrentIndex((prev) => (prev + 1) % vocabulary.length);
          };

            setIsFlipped(false);
            setCurrentIndex((prev) => (prev - 1 + vocabulary.length) % vocabulary.length);
          };
          
          const word = vocabulary[currentIndex];

          return (
            <div className="flex flex-col items-center justify-center py-10">

                className="w-full max-w-md aspect-[4/3] cursor-pointer group perspective-1000"

                  style={{ transform: isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)' }}

                  <div className="absolute inset-0 bg-gradient-to-br from-white/10 to-white/5 backdrop-blur-xl border border-white/20 rounded-3xl p-8 flex flex-col items-center justify-center shadow-2xl backface-hidden">

                      <p className="text-lg text-blue-300 bg-blue-900/40 border border-blue-500/20 py-2 px-4 rounded-xl shadow-inner"><span className="text-blue-500/80 text-sm mr-2 font-bold">RU:</span>{word.ru}</p>
                      <p className="text-lg text-amber-300 bg-amber-900/40 border border-amber-500/20 py-2 px-4 rounded-xl shadow-inner"><span className="text-amber-500/80 text-sm mr-2 font-bold">EN:</span>{word.en}</p>

        function VocabTest() {
          const [testQuestions, setTestQuestions] = useState([]);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [selectedOption, setSelectedOption] = useState(null);
          const [score, setScore] = useState(0);
          const [isCompleted, setIsCompleted] = useState(false);

          useEffect(() => {
            initializeTest();
          }, []);

          const initializeTest = () => {
            const questions = vocabulary.map(word => {
              let options = [word.uz];
              while(options.length < 4) {
                let randomWord = vocabulary[Math.floor(Math.random() * vocabulary.length)].uz;
                if(!options.includes(randomWord)) options.push(randomWord);
              }
              return {
                id: word.id,
                q: word.zh,
                options: options.sort(() => Math.random() - 0.5),
                correct: word.uz
              };
            });
            setTestQuestions(questions.sort(() => Math.random() - 0.5));
            setCurrentIndex(0);
            setSelectedOption(null);
            setScore(0);
            setIsCompleted(false);
          };

          if (testQuestions.length === 0) return null;

          const handleSelect = (option) => {
            if (selectedOption) return;
            setSelectedOption(option);
            if (option === testQuestions[currentIndex].correct) {
              setScore(prev => prev + 1);
            }
          };

          const handleNext = () => {
            if (currentIndex < testQuestions.length - 1) {
              setCurrentIndex(prev => prev + 1);
              setSelectedOption(null);
            } else {
              setIsCompleted(true);
            }
          };

          if (isCompleted) {
            return (
              <div className="flex flex-col items-center justify-center py-20 animate-fade-in">
                <div className="bg-gradient-to-br from-indigo-900/80 to-purple-900/80 p-10 rounded-3xl border border-white/20 text-center shadow-2xl max-w-md w-full">
                  <h2 className="text-4xl font-bold text-white mb-4">Test Yakunlandi!</h2>
                  <p className="text-xl text-indigo-200 mb-8">Sizning natijangiz:</p>
                  <div className="text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-10">
                    {score} / {testQuestions.length}
                  </div>
                  <button 
                    onClick={initializeTest}
                    className="flex items-center justify-center space-x-3 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white w-full py-4 rounded-xl font-bold text-lg transition-all shadow-lg"
                  >
                    <RefreshCw className="w-6 h-6" /> <span>Qayta urinish</span>
                  </button>
                </div>
              </div>
            );
          }

          const currentQ = testQuestions[currentIndex];
          const progressPercentage = ((currentIndex) / testQuestions.length) * 100;

          return (
            <div className="space-y-8 animate-fade-in py-6 max-w-2xl mx-auto">
              <div className="bg-gradient-to-r from-blue-900/50 to-indigo-900/50 p-6 rounded-2xl border border-blue-500/20 text-center">
                <h3 className="text-2xl font-bold text-blue-200">Lug'at Testi</h3>
                <p className="text-slate-400 mt-2">Faqat xitoycha iyerogliflarga qarab to'g'ri o'zbekcha tarjimani tanlang.</p>
              </div>

              <div className="w-full bg-slate-800 rounded-full h-2.5 mb-6 overflow-hidden">
                <div className="bg-gradient-to-r from-emerald-400 to-cyan-400 h-2.5 transition-all duration-500" style={{ width: `${progressPercentage}%` }}></div>
              </div>
              <div className="text-right text-indigo-300 font-mono text-sm mb-4">
                Savol: {currentIndex + 1} / {testQuestions.length}
              </div>

              <div className="bg-white/5 border border-white/10 rounded-3xl p-8 md:p-12 backdrop-blur-sm shadow-xl">
                <h4 className="text-7xl md:text-8xl font-bold text-center text-white mb-12 drop-shadow-lg">{currentQ.q}</h4>
                
                <div className="grid grid-cols-1 gap-4">
                  {currentQ.options.map((opt, i) => {
                    let btnClass = "py-4 px-6 rounded-xl border-2 transition-all text-center font-medium text-lg ";
                    
                    if (selectedOption) {
                      if (opt === currentQ.correct) {
                        btnClass += "bg-emerald-600/40 border-emerald-500 text-emerald-100 shadow-[0_0_15px_rgba(16,185,129,0.4)]";
                      } else if (selectedOption === opt) {
                        btnClass += "bg-rose-600/40 border-rose-500 text-rose-100";
                      } else {
                        btnClass += "bg-white/5 border-white/10 opacity-40";
                      }
                    } else {
                      btnClass += "bg-white/5 border-white/10 text-slate-200 hover:bg-white/10 hover:border-indigo-400 hover:text-white cursor-pointer";
                    }

                    return (
                      <button 
                        key={i} 
                        onClick={() => handleSelect(opt)} 
                        className={btnClass}
                        disabled={!!selectedOption}
                      >
                        {opt}
                      </button>
                    );
                  })}
                </div>

                {selectedOption && (
                  <div className="mt-10 flex justify-center animate-fade-in">
                    <button 
                      onClick={handleNext}
                      className="flex items-center space-x-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg shadow-emerald-500/20"
                    >
                      <span>{currentIndex < testQuestions.length - 1 ? 'Keyingi savol' : 'Natijani ko\'rish'}</span>
                      <ChevronRight className="w-5 h-5" />
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        }

                          </div>
                          <p className="text-indigo-300 font-mono tracking-wide">{line.py}</p>
                          <div className="mt-3 space-y-1 bg-black/20 p-3 rounded-lg border border-white/5">
                            <p className="text-emerald-200 text-sm"><span className="opacity-50 mr-2">UZ:</span>{line.uz}</p>
                            <p className="text-blue-200 text-sm"><span className="opacity-50 mr-2">RU:</span>{line.ru}</p>
                            <p className="text-amber-200/80 text-sm"><span className="opacity-50 mr-2">EN:</span>{line.en}</p>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          );
        }

        function Grammar() {
          return (
            <div className="space-y-8 animate-fade-in py-6">
              {grammarPoints.map((gp, i) => (
                <div key={i} className="bg-white/5 backdrop-blur-md border border-white/10 rounded-3xl p-8 shadow-xl">
                  <h3 className="text-2xl font-bold text-amber-400 mb-6 border-b border-white/10 pb-4">{gp.title}</h3>
                  
                  <div className="space-y-4 mb-8 text-slate-300">
                    <p className="flex"><span className="font-bold text-emerald-400 w-12 shrink-0">UZ:</span> <span>{gp.explanation.uz}</span></p>
                    <p className="flex"><span className="font-bold text-blue-400 w-12 shrink-0">RU:</span> <span>{gp.explanation.ru}</span></p>
                    <p className="flex"><span className="font-bold text-amber-200 w-12 shrink-0">EN:</span> <span>{gp.explanation.en}</span></p>
                  </div>

                  <div className="bg-black/20 rounded-2xl p-6 border border-white/5 space-y-5">
                    <h4 className="text-sm uppercase tracking-widest text-indigo-400 font-bold mb-4">Examples / Misollar</h4>
                    {gp.examples.map((ex, j) => (
                      <div key={j} className="space-y-1">
                        <p className="text-xl text-white font-medium">{ex.zh}</p>
                        <p className="text-indigo-300">{ex.py}</p>
                        <p className="text-emerald-300/80 text-sm">{ex.uz}</p>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          );
        }

        function GrammarTest() {
          const [answers, setAnswers] = useState({});
          const [submitted, setSubmitted] = useState(false);

          const handleSelect = (qIdx, optIdx) => {
            if (!submitted) {
              setAnswers({ ...answers, [qIdx]: optIdx });
            }
          };

          const calculateScore = () => {
            let score = 0;
            grammarTest.forEach((q, i) => {
              if (answers[i] === q.answer) score++;
            });
            return score;
          };

          return (
            <div className="space-y-8 animate-fade-in py-6 max-w-3xl mx-auto">
              <div className="bg-gradient-to-r from-purple-900/50 to-pink-900/50 p-6 rounded-2xl border border-purple-500/20 text-center">
                <h3 className="text-2xl font-bold text-purple-200">Grammatika Testi</h3>
                <p className="text-slate-400 mt-2">Faqat xitoycha yozuvdagi testni ishlash (Pinyin va tarjimalarsiz).</p>
              </div>

              {grammarTest.map((q, i) => (
                <div key={i} className="bg-white/5 border border-white/10 rounded-2xl p-6 md:p-8 backdrop-blur-sm">
                  <h4 className="text-2xl text-white mb-6 font-medium">{i + 1}. {q.q}</h4>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    {q.options.map((opt, j) => {
                      let btnClass = "py-4 px-6 rounded-xl border text-xl transition-all font-medium text-center ";
                      if (submitted) {
                        if (j === q.answer) btnClass += "bg-emerald-600/40 border-emerald-500 text-emerald-100";
                        else if (answers[i] === j) btnClass += "bg-rose-600/40 border-rose-500 text-rose-100";
                        else btnClass += "bg-white/5 border-white/10 opacity-50";
                      } else {
                        if (answers[i] === j) btnClass += "bg-indigo-600/50 border-indigo-400";
                        else btnClass += "bg-white/5 border-white/10 hover:bg-white/10 hover:border-white/20";
                      }

                      return (
                        <button key={j} onClick={() => handleSelect(i, j)} className={btnClass}>
                          {opt}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}

              <div className="flex flex-col items-center justify-center p-8 mt-8 border-t border-white/10">
                {!submitted ? (
                  <button 
                    onClick={() => setSubmitted(true)}
                    className="bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-400 hover:to-indigo-400 text-white px-10 py-4 rounded-xl font-bold text-lg transition-all shadow-lg shadow-purple-500/20"
                  >
                    Natijani ko'rish
                  </button>
                ) : (
                  <div className="text-center">
                    <h3 className="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-6">
                      Sizning Natijangiz: {calculateScore()} / {grammarTest.length}
                    </h3>
                    <button 
                      onClick={() => { setAnswers({}); setSubmitted(false); }}
                      className="flex items-center space-x-2 bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-xl font-bold transition-all mx-auto"
                    >
                      <RefreshCw className="w-5 h-5" /> <span>Qayta urinish</span>
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        function FillInTheBlanks() {
          const [answers, setAnswers] = useState({});
          const [submitted, setSubmitted] = useState(false);

          const handleSelect = (qIdx, value) => {
            if (!submitted) {
              setAnswers({ ...answers, [qIdx]: value });
            }
          };

          const calculateScore = () => {
            let score = 0;
            fillInBlankQuestions.forEach((q, i) => {
              if (answers[i] === q.answer) score++;
            });
            return score;
          };

          const renderQuestionText = (text, answerVal, qIdx, isCorrect) => {
            const parts = text.split("____");
            return (
              <div className="text-xl md:text-2xl font-medium leading-loose text-white flex flex-wrap items-center">
                <span>{parts[0]}</span>
                <span className={`inline-block min-w-[80px] mx-2 px-4 py-1 text-center border-b-2 font-bold ${
                  !answers[qIdx] ? 'border-slate-500 text-slate-500' :
                  submitted ? (isCorrect ? 'border-emerald-500 text-emerald-400' : 'border-rose-500 text-rose-400') :
                  'border-indigo-400 text-indigo-300'
                }`}>
                  {answers[qIdx] || '?'}
                </span>
                <span>{parts[1]}</span>
              </div>
            );
          };

          return (
            <div className="space-y-8 animate-fade-in py-6">
              <div className="bg-gradient-to-r from-teal-900/50 to-emerald-900/50 p-6 rounded-2xl border border-teal-500/20 text-center">
                <h3 className="text-2xl font-bold text-teal-200">So'zlarni to'ldirish (20 savol)</h3>
                <p className="text-slate-400 mt-2">Bo'shliqlarga mos keladigan so'zni tanlang.</p>
              </div>

              <div className="space-y-6">
                {fillInBlankQuestions.map((q, i) => {
                  const isCorrect = answers[i] === q.answer;
                  return (
                    <div key={i} className="bg-white/5 border border-white/10 rounded-3xl p-6 md:p-8 backdrop-blur-sm shadow-lg">
                      <div className="mb-6">
                        <span className="text-indigo-400 font-bold mr-3">{i + 1}.</span>
                        {renderQuestionText(q.q, answers[i], i, isCorrect)}
                      </div>
                      
                      <div className="flex flex-wrap gap-3">
                        {q.options.map((opt, j) => {
                          let btnClass = "px-5 py-2 rounded-lg border font-medium transition-all ";
                          if (submitted) {
                            if (opt === q.answer) btnClass += "bg-emerald-600/40 border-emerald-500 text-emerald-200";
                            else if (answers[i] === opt) btnClass += "bg-rose-600/40 border-rose-500 text-rose-200";
                            else btnClass += "bg-white/5 border-white/10 opacity-50";
                          } else {
                            if (answers[i] === opt) btnClass += "bg-indigo-600 border-indigo-400 text-white";
                            else btnClass += "bg-slate-800/80 border-slate-600 text-slate-300 hover:bg-slate-700";
                          }

                          return (
                            <button key={j} onClick={() => handleSelect(i, opt)} className={btnClass}>
                              {opt}
                            </button>
                          );
                        })}
                      </div>

                      {submitted && !isCorrect && (
                         <div className="mt-4 flex items-center text-emerald-400 text-sm font-medium">
                           <CheckCircle2 className="w-4 h-4 mr-1" /> To'g'ri javob: {q.answer}
                         </div>
                      )}
                    </div>
                  );
                })}
              </div>

              <div className="sticky bottom-20 bg-slate-900/90 backdrop-blur-xl p-6 rounded-2xl border border-white/10 shadow-2xl flex flex-col md:flex-row items-center justify-between z-10 mt-8">
                <div className="text-xl mb-4 md:mb-0">
                  {submitted ? (
                    <span className="font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">
                      Natija: {calculateScore()} / {fillInBlankQuestions.length}
                    </span>
                  ) : (
                    <span className="text-slate-400">Javob berilgan: {Object.keys(answers).length} / {fillInBlankQuestions.length}</span>
                  )}
                </div>
                <div className="flex space-x-4">
                  {!submitted ? (
                    <button 
                      onClick={() => setSubmitted(true)}
                      className="bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-lg shadow-teal-500/20"
                    >
                      Tekshirish
                    </button>
                  ) : (
                    <button 
                      onClick={() => { setAnswers({}); setSubmitted(false); }}
                      className="flex items-center space-x-2 bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-xl font-bold transition-all"
                    >
                      <RefreshCw className="w-5 h-5" /> <span>Qayta urinish</span>
                    </button>
                  )}
                </div>
              </div>
            </div>
          );
        }

        // --- MAIN APP COMPONENT ---
        function App() {
          const [activeTab, setActiveTab] = useState('flashcards');

          const speak = (text) => {
            if ('speechSynthesis' in window) {
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.lang = 'zh-CN';
              window.speechSynthesis.speak(utterance);
            }
          };

          const tabs = [
            { id: 'flashcards', label: "Lug'at", icon: <BookOpen className="w-5 h-5" /> },
            { id: 'vocabTest', label: "Lug'at Testi", icon: <CheckSquare className="w-5 h-5" /> },
            { id: 'dialogues', label: "Muloqot", icon: <MessageCircle className="w-5 h-5" /> },
            { id: 'grammar', label: "Grammatika", icon: <FileText className="w-5 h-5" /> },
            { id: 'grammarTest', label: "Grammatika Testi", icon: <CheckSquare className="w-5 h-5" /> },
            { id: 'fillBlank', label: "So'zlarni to'ldirish", icon: <Edit3 className="w-5 h-5" /> }
          ];

          return (
            <div className="min-h-screen text-slate-200">
              {/* Header */}
              <header className="bg-white/5 backdrop-blur-md border-b border-white/10 p-6 sticky top-0 z-20 shadow-xl">
                <div className="max-w-5xl mx-auto flex flex-col items-center text-center">
                  <h1 className="text-3xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-yellow-500 mb-2">
                    HSK 3 Lesson 10: 你明天再把书还给我
                  </h1>
                  <h2 className="text-lg md:text-xl text-indigo-300 font-medium tracking-wide">
                    Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                  </h2>
                </div>
              </header>

              {/* Navigation */}
              <nav className="max-w-5xl mx-auto p-4 mt-4 overflow-x-auto custom-scrollbar">
                <div className="flex space-x-2 md:justify-center min-w-max">
                  {tabs.map(tab => (
                    <button
                      key={tab.id}
                      onClick={() => setActiveTab(tab.id)}
                      className={`flex items-center space-x-2 px-5 py-3 rounded-xl transition-all duration-300 ${
                        activeTab === tab.id
                          ? 'bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-lg shadow-indigo-500/30'
                          : 'bg-white/5 text-slate-300 hover:bg-white/10 hover:text-white'
                      }`}
                    >
                      {tab.icon}
                      <span className="font-semibold">{tab.label}</span>
                    </button>
                  ))}
                </div>
              </nav>

              {/* Main Content Area */}
              <main className="max-w-5xl mx-auto p-4 pb-24">
                {activeTab === 'flashcards' && <Flashcards speak={speak} />}
                {activeTab === 'vocabTest' && <VocabTest />}
                {activeTab === 'dialogues' && <Dialogues speak={speak} />}
                {activeTab === 'grammar' && <Grammar />}
                {activeTab === 'grammarTest' && <GrammarTest />}
                {activeTab === 'fillBlank' && <FillInTheBlanks />}
              </main>

              {/* Footer */}
              <footer className="fixed bottom-0 w-full bg-slate-950/80 backdrop-blur-md border-t border-white/10 text-center py-4 text-sm text-slate-400 z-20">
                <p>HSK 3 NEW3.0 - Lesson 10</p>
                <p>© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
